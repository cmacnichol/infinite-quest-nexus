name: infinitequest

services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg18-trixie
    environment:
      POSTGRES_DB: infinitequest
      POSTGRES_USER: infinitequest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Copy .env.example to .env and set POSTGRES_PASSWORD}
    volumes:
      - infinitequest-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infinitequest -d infinitequest"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped
    networks:
      - infinitequest-backend

  infinitequest-app:
    build:
      context: .
    image: infinitequest-nexus:local
    environment:
      APP_ROLE: all
      APP_PORT: 8080
      DATABASE_URL: postgresql://infinitequest:${POSTGRES_PASSWORD}@postgres:5432/infinitequest
      ASSET_STORAGE_DRIVER: filesystem
      ASSET_STORAGE_ROOT: /var/lib/infinitequest/assets
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - infinitequest-assets:/var/lib/infinitequest/assets
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      - infinitequest-backend

volumes:
  infinitequest-postgres:
  infinitequest-assets:

networks:
  infinitequest-backend:
    name: infinitequest-backend
